<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Bobby Fighter</title>
    <style>
      :root {
        color-scheme: dark;
        --bezel: #14100f;
        --glow: #ffb347;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: radial-gradient(ellipse at 50% 0%, #2a2320 0%, #0b0908 70%);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        overflow: hidden;
      }
      #shell {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 12px;
      }
      #frame {
        position: relative;
        border-radius: 10px;
        background: var(--bezel);
        padding: 10px;
        box-shadow:
          0 0 0 1px #3a2f2a,
          0 24px 70px -12px #000,
          0 0 90px -30px var(--glow);
      }
      canvas {
        display: block;
        border-radius: 4px;
        background: #000;
        image-rendering: auto;
        touch-action: none;
      }
      /* Faint scanlines — sells the arcade cabinet without hurting readability. */
      #frame::after {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 4px;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.16) 0px,
          rgba(0, 0, 0, 0.16) 1px,
          transparent 1px,
          transparent 3px
        );
        mix-blend-mode: multiply;
        opacity: 0.55;
      }
      #hint {
        margin-top: 10px;
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.08em;
        color: #6d5c53;
        user-select: none;
      }
      #hint b { color: #a08a7c; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="shell">
      <div>
        <div id="frame"><canvas id="game"></canvas></div>
        <div id="hint">
          <b>&larr;&rarr;</b> move &nbsp;·&nbsp; <b>&uarr;</b> jump &nbsp;·&nbsp; <b>&darr;</b> crouch
          &nbsp;·&nbsp; <b>A/S</b> paw &nbsp;·&nbsp; <b>Z/X</b> kick &nbsp;·&nbsp; <b>D</b> special
          &nbsp;·&nbsp; <b>C</b> super &nbsp;·&nbsp; <b>F1</b> hitboxes
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
